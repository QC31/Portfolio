<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
<style>
    /* Contact Section */
        .contact-container {
            max-width: 700px;
            margin: 0 auto;
        }

        .contact-intro {
            text-align: center;
            margin-bottom: 3rem;
        }

        .contact-intro p {
            color: var(--light);
            margin-bottom: 2rem;
            font-size: 1.1rem;
        }

        .contact-socials {
            display: flex;
            justify-content: center;
            gap: 1rem;
            flex-wrap: wrap;
            margin-bottom: 2rem;
        }

        .social-btn {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.8rem 1.5rem;
            background-color: var(--dark);
            color: var(--white);
            text-decoration: none;
            border-radius: 5px;
            transition: all 0.3s;
            border: 1px solid transparent;
        }

        .social-btn:hover {
            background-color: var(--primary);
            color: var(--secondary);
            transform: translateY(-3px);
            border-color: var(--primary);
        }

        .or-divider {
            color: var(--light);
            font-style: italic;
            margin: 2rem 0;
        }

        /* Formulaire */
        .contact-form {
            background-color: var(--dark);
            padding: 2.5rem;
            border-radius: 10px;
            border: 1px solid rgba(0, 255, 136, 0.2);
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        .form-group label {
            display: block;
            color: var(--primary);
            margin-bottom: 0.5rem;
            font-weight: bold;
        }

        .form-group input,
        .form-group textarea {
            width: 100%;
            padding: 0.8rem;
            background-color: var(--secondary);
            border: 2px solid transparent;
            border-radius: 5px;
            color: var(--white);
            font-family: inherit;
            font-size: 1rem;
            transition: all 0.3s;
        }

        .form-group input:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: var(--primary);
            background-color: rgba(10, 25, 47, 0.8);
        }

        .form-group input::placeholder,
        .form-group textarea::placeholder {
            color: var(--light);
            opacity: 0.6;
        }

        .form-group textarea {
            resize: vertical;
            min-height: 120px;
        }

        .form-group input[type="file"] {
            padding: 0.5rem;
            cursor: pointer;
        }

        .file-info {
            color: var(--light);
            font-size: 0.85rem;
            margin-top: 0.5rem;
            font-style: italic;
        }

        .submit-btn {
            width: 100%;
            padding: 1rem 2rem;
            background-color: var(--primary);
            color: var(--secondary);
            border: none;
            border-radius: 5px;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
        }

        .submit-btn:hover {
            background-color: transparent;
            color: var(--primary);
            box-shadow: inset 0 0 0 2px var(--primary);
            transform: translateY(-2px);
        }

        /* Responsive */
        @media (max-width: 768px) {
            .contact-form {
                padding: 1.5rem;
            }

            .contact-socials {
                flex-direction: column;
            }

            .social-btn {
                width: 100%;
                justify-content: center;
            }
        }
</style>





    <!-- Contact Section -->
    <section id="contact">
        <h2>Contact</h2>
        <div class="contact-container">
            <!-- Formulaire -->
            <form action="https://formspree.io/f/VOTRE_FORM_ID" method="POST" enctype="multipart/form-data" class="contact-form">
                <div class="form-group">
                    <label for="name">Nom complet *</label>
                    <input type="text" id="name" name="name" placeholder="Jean Dupont" required>
                </div>

                <div class="form-group">
                    <label for="email">Email *</label>
                    <input type="email" id="email" name="email" placeholder="jean.dupont@example.com" required>
                </div>

                <div class="form-group">
                    <label for="subject">Sujet *</label>
                    <input type="text" id="subject" name="subject" placeholder="Opportunité d'alternance" required>
                </div>

                <div class="form-group">
                    <label for="message">Message *</label>
                    <textarea id="message" name="message" rows="6" placeholder="Votre message..." required></textarea>
                </div>

                <div class="form-group">
                    <label for="attachment">Pièce jointe (optionnel)</label>
                    <input type="file" id="attachment" name="attachment" accept=".pdf,.doc,.docx,.txt">
                    <p class="file-info">Formats acceptés : PDF, DOC, DOCX (max 10 MB)</p>
                </div>

                <button type="submit" class="submit-btn">
                    Envoyer le message ✉️
                </button>
            </form>
        </div>
    </section>
</body>
</html>
